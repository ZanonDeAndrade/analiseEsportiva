<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/src/assets/betintel-logo.png" />
    <meta
      name="description"
      content="BetIntel AI — plataforma acadêmica de análise probabilística de jogos de futebol com dados reais/cache local, para fins educacionais."
    />
    <title>BetIntel AI · Análise probabilística de futebol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Spinner do primeiro carregamento: aparece enquanto o bundle baixa e o
         React ainda nao montou. Quando o app renderiza, ele substitui o conteudo
         de #root e este spinner some sozinho. -->
    <style>
      #boot-loader {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #0e0f13;
      }
      #boot-loader span {
        width: 34px;
        height: 34px;
        border: 3px solid rgba(255, 255, 255, 0.16);
        border-top-color: #ff8c42;
        border-radius: 50%;
        animation: boot-spin 0.7s linear infinite;
      }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) {
        #boot-loader span { animation-duration: 1.6s !important; animation-iteration-count: infinite !important; }
      }
    </style>
    <div id="root">
      <div id="boot-loader"><span role="status" aria-label="Carregando"></span></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
