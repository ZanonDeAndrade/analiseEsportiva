name: betintel-development

x-app-environment: &app-environment
  NODE_ENV: development
  BETINTEL_ENVIRONMENT: development
  BETINTEL_BACKEND_HOST: 0.0.0.0
  BETINTEL_BACKEND_PORT: 3333
  DATABASE_URL: postgresql://betintel:betintel_local@postgres:5432/betintel
  DATABASE_POOL_MAX: 10
  REDIS_URL: redis://redis:6379
  BULLMQ_REDIS_URL: redis://redis:6379
  REDIS_KEY_PREFIX: betintel:development
  AUTH0_DOMAIN: local-development.us.auth0.com
  AUTH0_AUDIENCE: https://api.local.betintel.test/v1
  AUTH0_SPA_CLIENT_ID: local-spa-client
  AUTH0_MANAGEMENT_CLIENT_ID: local-management-client
  AUTH0_MANAGEMENT_CLIENT_SECRET: local-development-only-secret
  CORS_ALLOWED_ORIGINS: http://localhost:5173
  REQUEST_IP_HASH_KEY: local-development-only-32-byte-key
  APP_RELEASE: ${APP_RELEASE:-local-development}
  OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-betintel-api}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
  SENTRY_DSN: ${SENTRY_DSN:-}
  METRICS_BEARER_TOKEN: ${METRICS_BEARER_TOKEN:-}
  ENABLE_LEGACY_HTTP_ROUTES: "false"
  WORKER_DATABASE_URL: postgresql://betintel:betintel_local@postgres:5432/betintel
  SCHEDULER_DATABASE_URL: postgresql://betintel:betintel_local@postgres:5432/betintel
  WORKER_QUEUES: ingestion,normalization,training,evaluation,backtest,maintenance
  API_FOOTBALL_KEY: ${API_FOOTBALL_KEY:-}

services:
  postgres:
    image: postgres:17.6-alpine
    environment:
      POSTGRES_DB: betintel
      POSTGRES_USER: betintel
      POSTGRES_PASSWORD: betintel_local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betintel -d betintel"]
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - "${BETINTEL_COMPOSE_POSTGRES_PORT:-5432}:5432"
    volumes:
      - betintel-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7.4.5-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - "${BETINTEL_COMPOSE_REDIS_PORT:-6379}:6379"
    volumes:
      - betintel-redis:/data

  migrate:
    build:
      context: .
      target: runtime
    command: ["node", "backend/dist/cli/migrate.js"]
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      target: runtime
    environment: *app-environment
    ports:
      - "${BETINTEL_COMPOSE_API_PORT:-3333}:3333"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3333/v1/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20
    init: true
    stop_grace_period: 30s

  worker:
    profiles: ["jobs"]
    build:
      context: .
      target: runtime
    command: ["node", "--import", "./backend/dist/telemetry/instrumentation.js", "backend/dist/worker.js"]
    environment: *app-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    init: true
    stop_grace_period: 30s

  scheduler:
    profiles: ["jobs"]
    build:
      context: .
      target: runtime
    command: ["node", "--import", "./backend/dist/telemetry/instrumentation.js", "backend/dist/scheduler.js"]
    environment: *app-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
    init: true
    stop_grace_period: 30s

  restore-drill:
    profiles: ["disaster-recovery"]
    image: postgres:17.6-alpine
    entrypoint: ["/bin/sh", "/workspace/scripts/restore-drill.sh"]
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: betintel
      PGPASSWORD: betintel_local
      SOURCE_DATABASE: betintel
      RESTORE_DATABASE: betintel_restore
      RESTORE_DRILL_CONFIRM: local-development-only
    volumes:
      - ./scripts/restore-drill.sh:/workspace/scripts/restore-drill.sh:ro
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  betintel-postgres:
  betintel-redis:
